<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Number Guess Game</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>
    <div id="canvas-container"></div>
    <div class="container">
        <h1>Guess the Number</h1>
        <p>Pick 1-20, you have 10 attempts</p>
        
        <div class="game">
            <div class="stats">
                <span>Attempts: <strong id="attempts">10</strong></span>
                <span id="feedback"></span>
            </div>
            
            <div class="input-group">
                <input type="number" id="guessInput" min="1" max="20" placeholder="Your guess..." autocomplete="off">
                <button id="submitBtn">Guess</button>
            </div>
            
            <div id="history"></div>
            <button id="resetBtn" class="reset">New Game</button>
        </div>
    </div>

    <script src="three-viz.js"></script>
    <script src="script.js"></script>
</body>
</html>
